<style>

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .diff-b { background: #E6F1FB; color: #0C447C; }
  .diff-i { background: #FAEEDA; color: #633806; }
  .diff-a { background: #FCEBEB; color: #501313; }
  .type-c { background: #E1F5EE; color: #085041; }
  .type-t { background: #EEEDFE; color: #3C3489; }
  .type-f { background: #FAECE7; color: #712B13; }
  .tc-tools { padding: 0 13px 10px; }
  .tools-lbl { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .tools-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .tool-chip { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
  .tc-subtopics { padding: 0 13px 10px; border-top: 0.5px solid var(--color-border-tertiary); margin-top: 4px; }
  .sub-item { font-size: 12px; color: var(--color-text-secondary); padding: 3px 0; display: flex; align-items: flex-start; gap: 6px; line-height: 1.4; }
  .sub-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--color-border-secondary); flex-shrink: 0; margin-top: 6px; }
  .cert-box { background: var(--color-background-secondary); border-radius: 10px; padding: 14px 16px; margin-top: 1.5rem; }
  .cert-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 10px; }
  .cert-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .cert-row:last-child { border-bottom: none; }
  .cert-name { font-size: 13px; color: var(--color-text-primary); flex: 1; }
</style>

      {t:"Policy as Code",s:"OPA Rego, Kyverno, Sentinel (Terraform) — políticas versionadas, testáveis e auditáveis",diff:"a",type:"t",tools:["opa","kyverno","sentinel","conftest","cedar"],sub:["Escrever e testar policies Rego com framework opa test","Kyverno ClusterPolicies para enforce e mutate no Kubernetes","Sentinel no Terraform Cloud para controle de infraestrutura","Versionar policies como código junto com testes unitários","Criar dashboards de compliance baseados em policy evaluations"]},

  },
  {
    id:6,name:"Detecção, resposta & operações",weeks:"6–8",color:"#444441",light:"#F1EFE8",tc:"#2C2C2A",
    desc:"Operar segurança em produção: detectar ameaças, responder a incidentes e melhorar continuamente",
    topics:[
      {t:"SIEM & gestão de logs",s:"Elastic SIEM, Splunk, OpenSearch, Microsoft Sentinel — ingestão, parsing, correlação, alertas",diff:"a",type:"t",tools:["elastic-siem","splunk","sentinel","opensearch","cribl"],sub:["Arquitetar pipeline de logs com Cribl para normalização","Escrever detection rules com Sigma para portabilidade","Correlação de eventos: detectar lateral movement com multiple logins","Criar dashboards operacionais de segurança (SOC dashboard)","Tuning de regras para reduzir false positives com feedback loop"]},
      {t:"Threat intelligence & hunting",s:"MITRE ATT&CK, IOCs, TTPs, CTI feeds, STIX/TAXII, threat hunting proativo",diff:"a",type:"c",tools:["misp","opencti","elastic-edr","velociraptor"],sub:["Mapear ameaças ao MITRE ATT&CK para priorizar detecções","Consumir CTI feeds via STIX/TAXII no MISP","Conduzir threat hunting: hipótese → query → validação → detecção","Usar Velociraptor para hunting em endpoints em escala","Desenvolver playbooks de hunting baseados em TTPs de APTs"]},
      {t:"Incident response",s:"PICERL (Prepare, Identify, Contain, Eradicate, Recover, Lessons Learned), runbooks, forensics básico",diff:"a",type:"c",tools:["thehive","cortex","velociraptor","ir-toolkit","sleuth-kit"],sub:["Escrever runbooks para os 5 cenários mais comuns","Realizar tabletop exercises para validar runbooks","Análise de malware básica: strings, procmon, regshot","Triagem de incidentes cloud: CloudTrail pivot, IAM analysis","Conduzir post-mortems blameless e rastrear action items"]},
      {t:"Vulnerability management ops",s:"Tenable, Qualys, Wiz, ciclo de vida de vuln — descoberta, priorização, remediação, verificação",diff:"i",type:"t",tools:["tenable","qualys","defectdojo","rapid7","opencve"],sub:["Configurar scans autenticados recorrentes em toda a infra","Integrar resultados no DefectDojo com deduplicação automática","Criar SLA dashboards para rastrear aging de vulnerabilidades","Coordenar remediação com times de dev e operações","Verificar remediação com re-scan e fechar findings auditados"]},
      {t:"Runtime security",s:"Falco, Tetragon (eBPF), Aqua Security, Sysdig — detecção de anomalia em containers em produção",diff:"a",type:"t",tools:["falco","tetragon","sysdig","aqua","datadog-csm"],sub:["Criar regras Falco para detectar shells em containers, exfiltração","Tetragon com eBPF para visibilidade em nível de syscall","Configurar alertas de processo anômalo e conexão de rede","Integrar alertas de runtime no SIEM e abrir tickets automáticos","Analisar perfis de comportamento de containers em produção"]},
      {t:"Chaos engineering & resiliência",s:"Chaos Monkey, Litmus, Gremlin — game days, hipóteses, blast radius e segurança da resiliência",diff:"a",type:"c",tools:["litmus","gremlin","chaos-mesh","steadybit"],sub:["Definir hipóteses de caos com blast radius calculado","Executar experimentos em staging antes de produção","Game days: simular falhas de disponibilidade e segurança","Chaos para segurança: testar comportamento com cert expirado, mTLS down","Medir MTTR como KPI de resiliência operacional"]},
    ]
  },
  {
    id:7,name:"Maturidade & especialização",weeks:"8–12",color:"#993556",light:"#FBEAF0",tc:"#72243E",
    desc:"Nível avançado: arquitetura, ofensivo, métricas de maturidade e liderança técnica",
    topics:[
      {t:"Pentest & Red Team",s:"Metodologia PTES/OWASP, reconhecimento, exploit, pós-exploração, relatório técnico e executivo",diff:"a",type:"f",tools:["metasploit","burp-suite","nmap","bloodhound","impacket"],sub:["Fases: recon, scanning, exploitation, post-exploitation, reporting","Active Directory attacks: Kerberoasting, DCSync, Pass-the-Hash","Cloud pentesting: IAM privesc, metadata attacks, bucket takeover","Escrever relatórios técnicos e executivos com risco e impacto","Bug bounty: como reportar vulnerabilidades responsavelmente"]},
      {t:"Security architecture",s:"Secure by design, defense in depth, patterns de segurança cloud-native, zero trust architecture",diff:"a",type:"c",tools:["draw.io","lucidchart","c4-model"],sub:["Aplicar o modelo C4 para diagramar arquiteturas de segurança","Threat modeling de arquiteturas de microserviços","Padrões: BFF, sidecar, ambassador para segurança em k8s","Revisar arquiteturas de terceiros em due diligence","Criar ADRs (Architecture Decision Records) com análise de risco"]},
      {t:"Métricas de DevSecOps",s:"DORA + Security metrics: MTTR de vuln, CVE backlog aging, lead time to fix, escape rate",diff:"i",type:"c",tools:["grafana","datadog","dora-metrics","sleuth"],sub:["Definir métricas de maturidade com o OWASP DSOMM","Medir escape rate: vulnerabilidades encontradas em prod vs pre-prod","Lead time to fix segmentado por severidade e tipo","Construir scorecard de segurança por squad ou produto","Apresentar métricas para stakeholders em linguagem de risco"]},
      {t:"DevSecOps platform engineering",s:"Criar plataformas internas de segurança: golden paths, paved roads, self-service security tools",diff:"a",type:"c",tools:["backstage","port","cortex","internal-developer-portal"],sub:["Criar templates de projeto com segurança pré-configurada","Developer portal com scoring de segurança por serviço","Self-service para solicitar exceções com revisão automatizada","Integrar todas as ferramentas de segurança em uma plataforma unificada","Reduzir fricção: security que acelera, não bloqueia"]},
      {t:"AI & segurança",s:"LLM security (OWASP LLM Top 10), prompt injection, supply chain de modelos, AI-assisted defense",diff:"a",type:"c",tools:["garak","langchain","llamaindex","rebuff"],sub:["OWASP LLM Top 10: prompt injection, insecure output, training poisoning","Testar LLMs com Garak para vulnerabilidades conhecidas","Guardrails para LLMs em aplicações de produção","AI para detecção: anomaly detection em logs com ML","Riscos de modelos de terceiros: backdoors, evasion, membership inference"]},
      {t:"Certificações & carreira",s:"Roadmap de certs por nível — do Security+ ao OSCP, CKS, CDP e AWS Security Specialty",diff:"i",type:"c",tools:[],sub:["Fundamentos: CompTIA Security+, CC (ISC2)","Cloud: AWS Security Specialty, GCP Professional Security","Kubernetes: CKS (Certified Kubernetes Security Specialist)","Pentest: CEH, OSCP (OffSec Certified Professional)","DevSecOps: CDP (Certified DevSecOps Professional), CASE"]},
    ]
  }
];

const CERTS = [
  {name:"CompTIA Security+",level:"Fundamentos",lb:"#E1F5EE",ltc:"#085041"},
  {name:"CC — (ISC)² Certified in Cybersecurity",level:"Fundamentos",lb:"#E1F5EE",ltc:"#085041"},
  {name:"AWS Certified Security – Specialty",level:"Cloud",lb:"#FAEEDA",ltc:"#633806"},
  {name:"GCP Professional Cloud Security Engineer",level:"Cloud",lb:"#FAEEDA",ltc:"#633806"},
  {name:"CKS – Certified Kubernetes Security Specialist",level:"Containers",lb:"#E6F1FB",ltc:"#0C447C"},
  {name:"Certified DevSecOps Professional (CDP)",level:"DevSecOps",lb:"#EEEDFE",ltc:"#3C3489"},
  {name:"OSCP – Offensive Security Certified Professional",level:"Avançado",lb:"#FCEBEB",ltc:"#501313"},
  {name:"CISSP – ISC2",level:"Gestão",lb:"#F1EFE8",ltc:"#444441"},
];

const FILTERS=[{id:"all",label:"Todos"},{id:"b",label:"Iniciante"},{id:"i",label:"Intermediário"},{id:"a",label:"Avançado"},{id:"c",label:"Conceito"},{id:"t",label:"Ferramenta"},{id:"f",label:"Ofensivo"}];

const STORAGE_KEY="dsr_v1";
function loadProgress(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const a=JSON.parse(r);if(Array.isArray(a))return new Set(a);}}catch(e){}return new Set();}
function saveProgress(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify([...doneSet]));}catch(e){}}
function sanitize(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
let doneSet=loadProgress(),openPhases=new Set([0]),activeFilt="all",searchQ="";
function key(pi,ti){return pi+"-"+ti;}
function totalTopics(){return D.reduce((s,p)=>s+p.topics.length,0);}
function updateStats(){
  const tot=totalTopics(),dn=doneSet.size;
  document.getElementById("st-total").textContent=tot;
  document.getElementById("st-done").textContent=dn;
  document.getElementById("st-pct").textContent=Math.round(dn/tot*100)+"%";
}
function matchesFilter(t){if(activeFilt==="all")return true;return t.diff===activeFilt||t.type===activeFilt;}
function matchesSearch(t){if(!searchQ)return true;const q=searchQ.toLowerCase();return(t.t+t.s+(t.tools||[]).join(" ")+(t.sub||[]).join(" ")).toLowerCase().includes(q);}
function buildFilters(){
  const wrap=document.getElementById("frow");wrap.innerHTML="";
  FILTERS.forEach(f=>{const b=document.createElement("button");b.className="fchip"+(activeFilt===f.id?" on":"");b.textContent=f.label;b.onclick=()=>{activeFilt=f.id;applyFilters();};wrap.appendChild(b);});
}
function applyFilters(){
  searchQ=document.getElementById("srch").value;buildFilters();
  document.querySelectorAll(".topic-card").forEach(card=>{const pi=+card.dataset.pi,ti=+card.dataset.ti;const t=D[pi].topics[ti];card.classList.toggle("hidden",!matchesFilter(t)||!matchesSearch(t));});
  updatePhaseBars();
}
function updatePhaseBars(){
  D.forEach((p,pi)=>{const bar=document.getElementById("pbar-"+pi);const pct=document.getElementById("ppct-"+pi);if(!bar)return;const dn=p.topics.filter((_,ti)=>doneSet.has(key(pi,ti))).length;const tot=p.topics.length;bar.style.width=Math.round(dn/tot*100)+"%";pct.textContent=Math.round(dn/tot*100)+"%";});
  updateStats();
}
function toggleTopic(pi,ti){
  const k=key(pi,ti);if(doneSet.has(k))doneSet.delete(k);else doneSet.add(k);
  const card=document.querySelector(`.topic-card[data-pi="${pi}"][data-ti="${ti}"]`);
  if(card){card.classList.toggle("done",doneSet.has(k));card.querySelector(".tc-check").textContent=doneSet.has(k)?"✓":"";}
  updatePhaseBars();saveProgress();
}
function buildNav(){
  const wrap=document.getElementById("pnav-wrap");wrap.innerHTML="";
  D.forEach((p,i)=>{const b=document.createElement("button");b.className="pnav"+(openPhases.has(i)?" on":"");if(openPhases.has(i)){b.style.background=p.color;b.style.borderColor=p.color;}b.textContent=(i+1)+". "+p.name;b.onclick=()=>{if(openPhases.has(i))openPhases.delete(i);else openPhases.add(i);build();};wrap.appendChild(b);});
}
function buildCerts(){
  const box=document.getElementById("cert-box");
  box.innerHTML=`<div class="cert-title">Roadmap de certificações recomendadas</div>`+CERTS.map(c=>`<div class="cert-row"><span class="badge" style="background:${c.lb};color:${c.ltc}">${c.level}</span><span class="cert-name">${c.name}</span></div>`).join("");
}
function build(){
  buildNav();const content=document.getElementById("content");content.innerHTML="";
  D.forEach((p,pi)=>{
    const open=openPhases.has(pi);
    const dn=p.topics.filter((_,ti)=>doneSet.has(key(pi,ti))).length;
    const tot=p.topics.length;const pct=Math.round(dn/tot*100);
    const block=document.createElement("div");block.className="phase-block";
    const hdr=document.createElement("div");hdr.className="phase-hdr";hdr.style.background=p.light;
    hdr.innerHTML=`<div class="phase-ico" style="background:${p.color};color:#fff">${pi+1}</div><div class="phase-info"><div class="phase-name" style="color:${p.tc}">${p.name}</div><div class="phase-meta" style="color:${p.tc};opacity:.7">${p.desc} · ${p.weeks} semanas</div></div><div class="phase-prog"><div class="mini-bar"><div class="mini-fill" id="pbar-${pi}" style="width:${pct}%;background:${p.color}"></div></div><span class="mini-pct" id="ppct-${pi}" style="color:${p.tc}">${pct}%</span></div><span class="phase-chev${open?" open":""}" style="color:${p.tc}">▶</span>`;
    hdr.onclick=()=>{if(openPhases.has(pi))openPhases.delete(pi);else openPhases.add(pi);build();};
    block.appendChild(hdr);
    if(open){
      const grid=document.createElement("div");grid.className="topics-wrap";
      p.topics.forEach((t,ti)=>{
        const isDone=doneSet.has(key(pi,ti));const hidden=!matchesFilter(t)||!matchesSearch(t);
        const card=document.createElement("div");card.className="topic-card"+(isDone?" done":"")+(hidden?" hidden":"");card.dataset.pi=pi;card.dataset.ti=ti;
        card.innerHTML=`<div class="tc-head"><div class="tc-check">${isDone?"✓":""}</div><div class="tc-body"><div class="tc-title">${t.t}</div><div class="tc-sub">${t.s}</div></div></div><div class="tc-meta"><span class="badge diff-${t.diff}">${{b:"Iniciante",i:"Intermediário",a:"Avançado"}[t.diff]}</span><span class="badge type-${t.type==="f"?"f":t.type==="t"?"t":"c"}">${{c:"Conceito",t:"Ferramenta",f:"Ofensivo"}[t.type]}</span></div>${t.tools&&t.tools.length?`<div class="tc-tools"><div class="tools-lbl">Ferramentas</div><div class="tools-list">${t.tools.map(x=>`<span class="tool-chip">${x}</span>`).join("")}</div></div>`:""}<div class="tc-subtopics"><div class="tools-lbl" style="margin-bottom:6px">O que estudar</div>${t.sub.map(s=>`<div class="sub-item"><span class="sub-dot"></span><span>${s}</span></div>`).join("")}</div>`;
        card.onclick=()=>toggleTopic(pi,ti);grid.appendChild(card);
      });
      block.appendChild(grid);
    }
    content.appendChild(block);
  });
  buildCerts();updateStats();
}
buildFilters();build();
</script>
<div style="margin-top:2rem;padding:1rem 0;border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
  <span style="font-size:12px;color:var(--color-text-tertiary)">DevSecOps Roadmap — uso pessoal e educacional · progresso salvo no navegador</span>
  <button onclick="if(confirm('Resetar todo o progresso?')){localStorage.removeItem('dsr_v1');doneSet=new Set();build();}" style="font-size:12px;padding:4px 12px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;">Resetar progresso</button>
</div>
