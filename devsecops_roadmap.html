
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: transparent; }
.wrap { padding: 1.5rem 1rem 2rem; }
.phase-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.phase-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .18s; }
.phase-btn.active { border-color: transparent; color: #fff; }
.phase-btn[data-idx="0"].active { background: #534AB7; }
.phase-btn[data-idx="1"].active { background: #0F6E56; }
.phase-btn[data-idx="2"].active { background: #854F0B; }
.phase-btn[data-idx="3"].active { background: #993C1D; }
.phase-btn[data-idx="4"].active { background: #185FA5; }
.phase-btn[data-idx="5"].active { background: #993556; }

.phase-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
.phase-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.phase-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.phase-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }

.topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.topic-card { background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all .16s; }
.topic-card:hover { border-color: var(--color-border-primary); transform: translateY(-1px); }
.topic-card.done { border-left: 3px solid #1D9E75; }
.topic-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.topic-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
.topic-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }

.resources { background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); border-radius: 10px; padding: 14px 16px; }
.resources-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 10px; }
.resource-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--color-border-tertiary); }
.resource-row:last-child { border-bottom: none; }
.resource-type { font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 500; flex-shrink: 0; }
.resource-name { font-size: 13px; color: var(--color-text-primary); }

.progress-bar-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
.progress-label { font-size: 12px; color: var(--color-text-secondary); min-width: 80px; }
.progress-bar { flex: 1; height: 6px; background: var(--color-border-tertiary); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.progress-count { font-size: 12px; color: var(--color-text-secondary); min-width: 40px; text-align: right; }

.check-hint { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 1rem; }
</style>

<div class="wrap">
<div class="phase-nav" id="nav"></div>
<div class="progress-bar-wrap">
  <span class="progress-label" id="prog-label">Fase 1 de 6</span>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="progress-count" id="prog-count">0 / 0</span>
</div>
<div class="phase-header">
  <div class="phase-dot" id="phase-dot"></div>
  <div>
    <div class="phase-title" id="phase-title"></div>
    <div class="phase-sub" id="phase-sub"></div>
  </div>
</div>
<p class="check-hint">Clique em um tópico para marcá-lo como concluído ✓</p>
<div class="topics-grid" id="topics"></div>
<div class="resources" id="resources-box">
  <div class="resources-title">Recursos recomendados</div>
  <div id="resources-list"></div>
</div>
</div>

<script>
const phases = [
  {
    name: "Fundamentos",
    sub: "Base sólida antes de qualquer ferramenta",
    color: "#534AB7",
    dot: "#7F77DD",
    topics: [
      { name: "Redes e protocolos", desc: "TCP/IP, DNS, HTTP/S, TLS, firewalls, VPN, OSI model", tags: ["networking"] },
      { name: "Linux & linha de comando", desc: "Permissões, processos, cron, systemd, logs, scripting bash", tags: ["linux"] },
      { name: "Controle de versão (Git)", desc: "Branching, merge, rebase, hooks, gestão de segredos", tags: ["git"] },
      { name: "Fundamentos de segurança", desc: "CIA triad, autenticação, autorização, criptografia, PKI", tags: ["security"] },
      { name: "Cloud (AWS/GCP/Azure)", desc: "IAM, VPC, storage, compute, billing e modelo de responsabilidade", tags: ["cloud"] },
      { name: "Programação/Scripting", desc: "Python ou Go para automação, análise de logs e ferramentas", tags: ["code"] },
    ],
    resources: [
      { type: "Livro", name: "The Web Application Hacker's Handbook", color: "#EEEDFE", tc: "#3C3489" },
      { type: "Curso", name: "Linux Foundation – Intro to DevOps & Site Reliability", color: "#E1F5EE", tc: "#085041" },
      { type: "Prática", name: "TryHackMe – Pre-Security path", color: "#FAEEDA", tc: "#633806" },
    ]
  },
  {
    name: "DevOps Core",
    sub: "Entender o pipeline antes de protegê-lo",
    color: "#0F6E56",
    dot: "#1D9E75",
    topics: [
      { name: "CI/CD pipelines", desc: "GitHub Actions, GitLab CI, Jenkins – estágios, artefatos, gates", tags: ["ci/cd"] },
      { name: "Containers & Docker", desc: "Dockerfile, layers, registries, docker-compose, namespaces", tags: ["containers"] },
      { name: "Kubernetes", desc: "Pods, services, RBAC, network policies, secrets, admission controllers", tags: ["k8s"] },
      { name: "Infraestrutura como código", desc: "Terraform, Pulumi, Ansible – estado, módulos, drift", tags: ["iac"] },
      { name: "Observabilidade", desc: "Logs, métricas (Prometheus/Grafana), rastreamento distribuído, alertas", tags: ["monitoring"] },
      { name: "Artifact management", desc: "Nexus, JFrog Artifactory, OCI registries, assinatura de artefatos", tags: ["artifacts"] },
    ],
    resources: [
      { type: "Livro", name: "The DevOps Handbook – Kim, Humble et al.", color: "#E1F5EE", tc: "#085041" },
      { type: "Curso", name: "KodeKloud – Docker & Kubernetes", color: "#EEEDFE", tc: "#3C3489" },
      { type: "Prática", name: "Killercoda – cenários interativos de K8s", color: "#FAEEDA", tc: "#633806" },
    ]
  },
  {
    name: "Segurança no Código",
    sub: "Shift-left: segurança o mais cedo possível",
    color: "#854F0B",
    dot: "#EF9F27",
    topics: [
      { name: "SAST", desc: "Semgrep, Bandit, SonarQube – análise estática sem executar o código", tags: ["sast"] },
      { name: "SCA & Supply Chain", desc: "SBOM, Dependabot, Snyk, OWASP Dependency-Check, CVE scoring", tags: ["sca"] },
      { name: "Secret scanning", desc: "GitGuardian, Gitleaks, pre-commit hooks, rotação de credenciais", tags: ["secrets"] },
      { name: "OWASP Top 10", desc: "Injeção, SSRF, IDOR, misconfig, broken auth – exemplos práticos", tags: ["owasp"] },
      { name: "Threat modeling", desc: "STRIDE, PASTA, attack trees – modelar ameaças por design", tags: ["threat"] },
      { name: "Revisão de código seguro", desc: "Critérios de PR, checklists de segurança, pair review de seg.", tags: ["review"] },
    ],
    resources: [
      { type: "Site", name: "OWASP.org – guias e cheatsheets", color: "#FAEEDA", tc: "#633806" },
      { type: "Ferramenta", name: "Semgrep playground – regras interativas", color: "#E1F5EE", tc: "#085041" },
      { type: "Livro", name: "Threat Modeling – Adam Shostack", color: "#EEEDFE", tc: "#3C3489" },
    ]
  },
  {
    name: "Segurança de Infraestrutura",
    sub: "Proteger pipelines, containers e cloud",
    color: "#993C1D",
    dot: "#D85A30",
    topics: [
      { name: "Segurança de containers", desc: "Trivy, Grype, Dockerfile best practices, rootless, seccomp, AppArmor", tags: ["containers"] },
      { name: "Kubernetes hardening", desc: "Pod Security Standards, OPA/Gatekeeper, Falco, auditoria de API", tags: ["k8s"] },
      { name: "Cloud Security Posture (CSPM)", desc: "AWS Security Hub, Wiz, Prisma Cloud – configurações incorretas", tags: ["cloud"] },
      { name: "Segurança de IaC", desc: "Checkov, tfsec, Terrascan – scanning de Terraform/CloudFormation", tags: ["iac"] },
      { name: "Gerenciamento de segredos", desc: "HashiCorp Vault, AWS Secrets Manager, rotação automática", tags: ["secrets"] },
      { name: "Zero Trust & network seg.", desc: "mTLS, service mesh (Istio/Linkerd), microsegmentação, eBPF", tags: ["network"] },
    ],
    resources: [
      { type: "Curso", name: "CNCF – Kubernetes Security Essentials (LKS101)", color: "#FCEBEB", tc: "#501313" },
      { type: "Ferramenta", name: "Trivy – scanner open-source multi-alvo", color: "#E1F5EE", tc: "#085041" },
      { type: "Prática", name: "CloudGoat (Rhino Security) – labs de cloud attack", color: "#FAEEDA", tc: "#633806" },
    ]
  },
  {
    name: "Compliance & Governança",
    sub: "Frameworks, políticas e auditoria contínua",
    color: "#185FA5",
    dot: "#378ADD",
    topics: [
      { name: "Frameworks regulatórios", desc: "LGPD, ISO 27001, SOC 2, PCI-DSS, NIST CSF – obrigações e controles", tags: ["compliance"] },
      { name: "Policy as Code", desc: "OPA Rego, Kyverno, Sentinel – políticas versionadas e testáveis", tags: ["policy"] },
      { name: "Auditoria de pipeline", desc: "SLSA framework, proveniência de build, attestations, DSSE", tags: ["supply"] },
      { name: "Gestão de vulnerabilidades", desc: "CVE lifecycle, priorização com EPSS, SLA de remediação", tags: ["vuln"] },
      { name: "Gestão de identidade (IAM)", desc: "Least privilege, PAM, MFA, Just-In-Time access, federation", tags: ["iam"] },
      { name: "Risk & compliance contínua", desc: "Driftctl, continuous compliance, dashboards de postura", tags: ["risk"] },
    ],
    resources: [
      { type: "Cert.", name: "CompTIA Security+ – base sólida de compliance", color: "#E6F1FB", tc: "#0C447C" },
      { type: "Site", name: "NIST Cybersecurity Framework (csrc.nist.gov)", color: "#FAEEDA", tc: "#633806" },
      { type: "Curso", name: "SANS – DEV540 Secure DevOps & Cloud App Security", color: "#EEEDFE", tc: "#3C3489" },
    ]
  },
  {
    name: "Resposta & Maturidade",
    sub: "Operar, detectar e evoluir continuamente",
    color: "#993556",
    dot: "#D4537E",
    topics: [
      { name: "DAST & pentest contínuo", desc: "OWASP ZAP, Burp Suite, nuclei – testes em staging/produção", tags: ["dast"] },
      { name: "SIEM & detecção", desc: "Splunk, OpenSearch, Elastic SIEM – correlação de eventos, SIGMArules", tags: ["siem"] },
      { name: "Incident response", desc: "Runbooks, playbooks, post-mortems, RTO/RPO, cadeia de custódia", tags: ["ir"] },
      { name: "Chaos Engineering", desc: "Chaos Monkey, Litmus, game days – resiliência comprovada", tags: ["chaos"] },
      { name: "Métricas de DevSecOps", desc: "DORA metrics + segurança: MTTR, CVE backlog, lead time to fix", tags: ["metrics"] },
      { name: "Cultura & advocacy", desc: "Treinamento de devs, gamification, champions program, blameless culture", tags: ["culture"] },
    ],
    resources: [
      { type: "Cert.", name: "Certified DevSecOps Professional (CDP) – Practical DevSecOps", color: "#FBEAF0", tc: "#72243E" },
      { type: "Livro", name: "Alice and Bob Learn Application Security", color: "#EEEDFE", tc: "#3C3489" },
      { type: "Comunidade", name: "OWASP DevSecOps Guideline (GitHub)", color: "#E1F5EE", tc: "#085041" },
    ]
  }
];

const tagColors = {
  networking: ["#E6F1FB","#0C447C"], linux: ["#EAF3DE","#27500A"],
  git: ["#F1EFE8","#444441"], security: ["#EEEDFE","#3C3489"],
  cloud: ["#E6F1FB","#185FA5"], code: ["#EAF3DE","#3B6D11"],
  "ci/cd": ["#E1F5EE","#085041"], containers: ["#FAEEDA","#633806"],
  k8s: ["#E6F1FB","#0C447C"], iac: ["#EAF3DE","#27500A"],
  monitoring: ["#EEEDFE","#3C3489"], artifacts: ["#F1EFE8","#444441"],
  sast: ["#FAEEDA","#633806"], sca: ["#FCEBEB","#501313"],
  secrets: ["#EEEDFE","#3C3489"], owasp: ["#FAECE7","#712B13"],
  threat: ["#FBEAF0","#72243E"], review: ["#E1F5EE","#085041"],
  network: ["#E6F1FB","#0C447C"], supply: ["#EAF3DE","#27500A"],
  compliance: ["#E6F1FB","#185FA5"], policy: ["#EEEDFE","#3C3489"],
  vuln: ["#FCEBEB","#501313"], iam: ["#E6F1FB","#0C447C"],
  risk: ["#FAEEDA","#633806"], dast: ["#FCEBEB","#501313"],
  siem: ["#E6F1FB","#0C447C"], ir: ["#FBEAF0","#72243E"],
  chaos: ["#FAEEDA","#633806"], metrics: ["#E1F5EE","#085041"], culture: ["#EEEDFE","#3C3489"]
};

let current = 0;
const done = phases.map(p => p.topics.map(() => false));

function render(idx) {
  current = idx;
  const p = phases[idx];
  document.querySelectorAll('.phase-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.getElementById('phase-dot').style.background = p.dot;
  document.getElementById('phase-title').textContent = `Fase ${idx+1}: ${p.name}`;
  document.getElementById('phase-sub').textContent = p.sub;
  document.getElementById('prog-label').textContent = `Fase ${idx+1} de ${phases.length}`;

  const completed = done[idx].filter(Boolean).length;
  const total = p.topics.length;
  document.getElementById('prog-fill').style.width = (completed/total*100)+'%';
  document.getElementById('prog-fill').style.background = p.color;
  document.getElementById('prog-count').textContent = `${completed} / ${total}`;

  const grid = document.getElementById('topics');
  grid.innerHTML = p.topics.map((t,i) => `
    <div class="topic-card${done[idx][i]?' done':''}" onclick="toggle(${idx},${i})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="topic-name">${t.name}</div>
        <span style="font-size:16px;color:#1D9E75;transition:opacity .2s;opacity:${done[idx][i]?1:0}">✓</span>
      </div>
      <div class="topic-desc">${t.desc}</div>
      <div class="topic-tags">${t.tags.map(tag => {
        const [bg,tc] = tagColors[tag]||["#F1EFE8","#444441"];
        return `<span class="tag" style="background:${bg};color:${tc}">${tag}</span>`;
      }).join('')}</div>
    </div>`).join('');

  document.getElementById('resources-list').innerHTML = p.resources.map(r => `
    <div class="resource-row">
      <span class="resource-type" style="background:${r.color};color:${r.tc}">${r.type}</span>
      <span class="resource-name">${r.name}</span>
    </div>`).join('');
}

function toggle(pidx, tidx) {
  done[pidx][tidx] = !done[pidx][tidx];
  render(pidx);
}

const nav = document.getElementById('nav');
phases.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'phase-btn';
  btn.dataset.idx = i;
  btn.textContent = `${i+1}. ${p.name}`;
  btn.onclick = () => render(i);
  nav.appendChild(btn);
});

render(0);
</script>
